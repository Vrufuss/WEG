<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>WE Possession Calendar</title>
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="WE Cal" />
<meta name="theme-color" content="#0E1318" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
:root {
  --ink: #0E1318;
  --panel: #141A21;
  --rail: #F47B20;
  --chalk: #EDE9E0;
  --ballast: #8C93A0;
  --line: #28303B;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html, body { height: 100%; }
body {
  position: fixed; inset: 0; overflow: hidden;
  background: var(--ink); color: var(--chalk);
  font-family: 'Barlow', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
  display: flex; justify-content: center;
}
.cond { font-family: 'Barlow Condensed', 'Barlow', sans-serif; }
.tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

#app {
  width: 100%; max-width: 30rem;
  height: 100dvh;
  display: flex; flex-direction: column;
  padding-top: var(--safe-top);
}

/* ---------- header ---------- */
header {
  padding: 14px 18px 10px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.eyebrow {
  font-size: 11px; letter-spacing: .18em; color: var(--ballast);
  text-transform: uppercase; font-weight: 600;
}
.seg {
  display: flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden;
  flex: none;
}
.seg button {
  appearance: none; border: 0; background: transparent; color: var(--ballast);
  font: 600 13px 'Barlow', sans-serif; letter-spacing: .04em;
  padding: 7px 14px; cursor: pointer; touch-action: manipulation;
}
.seg button.on { background: var(--rail); color: #16100A; }
.seg button:focus-visible { outline: 2px solid var(--rail); outline-offset: -2px; }

/* ---------- hero board ---------- */
.board { padding: 4px 18px 14px; }
.board-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.step {
  appearance: none; border: 1px solid var(--line); background: var(--panel);
  color: var(--chalk); border-radius: 14px;
  width: 58px; height: 64px; flex: none;
  font: 600 26px 'Barlow Condensed', sans-serif;
  cursor: pointer; touch-action: manipulation;
}
.step:active { background: #1C242E; }
.step:disabled { opacity: .25; }
.step:focus-visible { outline: 2px solid var(--rail); }
.we-wrap {
  display: flex; align-items: baseline; justify-content: center; gap: 6px;
  min-width: 0;
}
.we-label {
  font: 700 34px/1 'Barlow Condensed', sans-serif;
  color: var(--ballast); letter-spacing: .04em;
}
#weInput {
  appearance: none; border: 0; background: transparent;
  font: 700 86px/1 'Barlow Condensed', sans-serif;
  color: var(--rail); width: 2.4ch; text-align: center; caret-color: var(--rail);
  border-bottom: 2px solid transparent;
  font-variant-numeric: tabular-nums;
}
#weInput:focus { outline: none; border-bottom-color: var(--rail); }
.dates {
  text-align: center; margin-top: 2px;
  font: 500 19px/1.3 'Barlow', sans-serif;
}
.slot-tag {
  height: 22px; text-align: center; margin-top: 6px;
  font: 600 13px/22px 'Barlow', sans-serif; letter-spacing: .03em;
  color: var(--rail);
}
.slot-status {
  height: 30px; margin-top: 6px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.status-txt { font: 500 14px 'Barlow', sans-serif; color: var(--ballast); }
.status-txt.now { color: var(--chalk); }
.dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--ballast); flex: none;
}
.dot.now { background: var(--rail); }
@media (prefers-reduced-motion: no-preference) {
  .dot.now { animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 50% { box-shadow: 0 0 0 6px rgba(244,123,32,.18); } }
}
.today-btn {
  appearance: none; border: 1px solid var(--rail); background: transparent;
  color: var(--rail); border-radius: 999px; padding: 5px 14px;
  font: 600 13px 'Barlow', sans-serif; letter-spacing: .05em;
  cursor: pointer; touch-action: manipulation;
}
.today-btn:active { background: rgba(244,123,32,.15); }
.today-btn:focus-visible { outline: 2px solid var(--rail); outline-offset: 2px; }

/* ---------- rail divider ---------- */
.rail-divider {
  height: 16px; flex: none; margin: 0 18px;
  background:
    linear-gradient(var(--rail), var(--rail)) 0 4px / 100% 2px no-repeat,
    linear-gradient(var(--rail), var(--rail)) 0 10px / 100% 2px no-repeat,
    repeating-linear-gradient(90deg, #39424E 0 3px, transparent 3px 16px) 0 0 / 100% 100%;
  opacity: .85;
}

/* ---------- list ---------- */
#list {
  position: relative;
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 6px 18px calc(24px + var(--safe-bottom));
}
.month {
  font: 600 12px 'Barlow Condensed', sans-serif; letter-spacing: .22em;
  color: var(--ballast); padding: 18px 2px 6px;
}
.row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 10px; border-radius: 12px;
  border-left: 3px solid transparent;
  cursor: pointer;
}
.row + .row { border-top: 1px solid transparent; }
.row .badge {
  font: 700 19px 'Barlow Condensed', sans-serif; letter-spacing: .03em;
  color: var(--chalk); width: 58px; flex: none;
}
.row .rdates { font: 500 15px 'Barlow', sans-serif; color: var(--chalk); flex: 1; }
.row .rtag { font: 600 11px 'Barlow', sans-serif; color: var(--rail); letter-spacing: .03em; text-align: right; max-width: 40%; }
.row .nowchip {
  font: 700 10px 'Barlow', sans-serif; letter-spacing: .12em;
  color: #16100A; background: var(--rail); border-radius: 6px;
  padding: 2px 6px; flex: none;
}
.row.past { opacity: .4; }
.row.sel { background: var(--panel); border-left-color: var(--rail); }
.foot {
  margin-top: 26px; padding-top: 14px; border-top: 1px solid var(--line);
  font: 400 12px/1.55 'Barlow', sans-serif; color: var(--ballast);
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="eyebrow">Sydney Trains</div>
      <div class="eyebrow" style="color:var(--chalk); letter-spacing:.14em; margin-top:2px;">Weekend Possessions</div>
    </div>
    <div class="seg" role="tablist" aria-label="Program year">
      <button id="seg2526" role="tab">25/26</button>
      <button id="seg2627" role="tab">26/27</button>
    </div>
  </header>

  <div class="board">
    <div class="board-row">
      <button class="step" id="prevBtn" aria-label="Previous weekend">&#8249;</button>
      <div class="we-wrap">
        <span class="we-label">WE</span>
        <input id="weInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" aria-label="Weekend number" />
      </div>
      <button class="step" id="nextBtn" aria-label="Next weekend">&#8250;</button>
    </div>
    <div class="dates tnum" id="dates"></div>
    <div class="slot-tag" id="tag"></div>
    <div class="slot-status">
      <span class="dot" id="dot"></span>
      <span class="status-txt" id="status"></span>
      <button class="today-btn" id="todayBtn">Today</button>
    </div>
  </div>

  <div class="rail-divider" aria-hidden="true"></div>

  <div id="list"></div>
</div>

un 4 Apr 2027","short":"3\u20134 Apr","m":"APRIL 2027","t":"","lw":0},{"p":"26/27","n":41,"s":"2027-04-10","e":"2027-04-11","full":"Sat 10 \u2013 Sun 11 Apr 2027","short":"10\u201311 Apr","m":"APRIL 2027","t":"","lw":0},{"p":"26/27","n":42,"s":"2027-04-17","e":"2027-04-18","full":"Sat 17 \u2013 Sun 18 Apr 2027","short":"17\u201318 Apr","m":"APRIL 2027","t":"","lw":0},{"p":"26/27","n":43,"s":"2027-04-24","e":"2027-04-26","full":"Sat 24 \u2013 Mon 26 Apr 2027","short":"24\u201326 Apr","m":"APRIL 2027","t":"Anzac Day long weekend","lw":1},{"p":"26/27","n":44,"s":"2027-05-01","e":"2027-05-02","full":"Sat 1 \u2013 Sun 2 May 2027","short":"1\u20132 May","m":"MAY 2027","t":"","lw":0},{"p":"26/27","n":45,"s":"2027-05-08","e":"2027-05-09","full":"Sat 8 \u2013 Sun 9 May 2027","short":"8\u20139 May","m":"MAY 2027","t":"","lw":0},{"p":"26/27","n":46,"s":"2027-05-15","e":"2027-05-16","full":"Sat 15 \u2013 Sun 16 May 2027","short":"15\u201316 May","m":"MAY 2027","t":"","lw":0},{"p":"26/27","n":47,"s":"2027-05-22","e":"2027-05-23","full":"Sat 22 \u2013 Sun 23 May 2027","short":"22\u201323 May","m":"MAY 2027","t":"","lw":0},{"p":"26/27","n":48,"s":"2027-05-29","e":"2027-05-30","full":"Sat 29 \u2013 Sun 30 May 2027","short":"29\u201330 May","m":"MAY 2027","t":"","lw":0},{"p":"26/27","n":49,"s":"2027-06-05","e":"2027-06-06","full":"Sat 5 \u2013 Sun 6 Jun 2027","short":"5\u20136 Jun","m":"JUNE 2027","t":"","lw":0},{"p":"26/27","n":50,"s":"2027-06-12","e":"2027-06-14","full":"Sat 12 \u2013 Mon 14 Jun 2027","short":"12\u201314 Jun","m":"JUNE 2027","t":"King's Birthday long weekend","lw":1},{"p":"26/27","n":51,"s":"2027-06-19","e":"2027-06-20","full":"Sat 19 \u2013 Sun 20 Jun 2027","short":"19\u201320 Jun","m":"JUNE 2027","t":"","lw":0},{"p":"26/27","n":52,"s":"2027-06-26","e":"2027-06-27","full":"Sat 26 \u2013 Sun 27 Jun 2027","short":"26\u201327 Jun","m":"JUNE 2027","t":"","lw":0}];

const $ = id => document.getElementById(id);
const listEl = $('list'), weInput = $('weInput');

// ---- date helpers (all local-time, midnight) ----
function iso2d(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function today0(){ const t = new Date(); return new Date(t.getFullYear(), t.getMonth(), t.getDate()); }
const DAY = 86400000;

// current = first weekend (chronologically) whose end >= today
function findCurrent(){
  const t = today0().getTime();
  for (const r of WE_DATA){ if (iso2d(r.e).getTime() >= t) return r; }
  return WE_DATA[WE_DATA.length - 1];
}
const CURRENT = findCurrent();

let prog = CURRENT.p;
let selN = CURRENT.n;

const byProg = p => WE_DATA.filter(r => r.p === p);
const getRow = (p, n) => WE_DATA.find(r => r.p === p && r.n === n);

function relText(r){
  const t = today0().getTime();
  const s = iso2d(r.s).getTime(), e = iso2d(r.e).getTime();
  if (t >= s && t <= e) return ['This weekend', true];
  if (t < s){
    const days = Math.round((s - t) / DAY);
    if (days <= 6) return ['In ' + days + (days === 1 ? ' day' : ' days'), true];
    const w = Math.round(days / 7);
    return ['In ' + w + (w === 1 ? ' week' : ' weeks'), false];
  }
  const days = Math.round((t - e) / DAY);
  if (days <= 6) return [days + (days === 1 ? ' day ago' : ' days ago'), false];
  const w = Math.round(days / 7);
  return [w + (w === 1 ? ' week ago' : ' weeks ago'), false];
}

function renderHero(){
  const r = getRow(prog, selN);
  weInput.value = String(r.n).padStart(2, '0');
  $('dates').textContent = r.full;
  $('tag').textContent = r.t || '';
  const [txt, isNow] = relText(r);
  $('status').textContent = txt;
  $('status').classList.toggle('now', isNow);
  $('dot').classList.toggle('now', isNow);
  const gi = WE_DATA.findIndex(x => x.p === prog && x.n === selN);
  $('prevBtn').disabled = gi <= 0;
  $('nextBtn').disabled = gi >= WE_DATA.length - 1;
  $('seg2526').classList.toggle('on', prog === '25/26');
  $('seg2627').classList.toggle('on', prog === '26/27');
}

function renderList(){
  const rows = byProg(prog);
  const t = today0().getTime();
  let html = '', lastMonth = '';
  for (const r of rows){
    if (r.m !== lastMonth){ html += '<div class="month">' + r.m + '</div>'; lastMonth = r.m; }
    const past = iso2d(r.e).getTime() < t;
    const isCur = (r.p === CURRENT.p && r.n === CURRENT.n);
    html += '<div class="row' + (past ? ' past' : '') + '" data-n="' + r.n + '" id="row' + r.n + '">'
      + '<span class="badge">WE' + String(r.n).padStart(2, '0') + '</span>'
      + '<span class="rdates tnum">' + r.short + '</span>'
      + (isCur ? '<span class="nowchip">NOW</span>' : '')
      + (r.t ? '<span class="rtag">' + r.t + '</span>' : '')
      + '</div>';
  }
  listEl.innerHTML = html;
  markSel(false);
}

function markSel(scroll){
  listEl.querySelectorAll('.row.sel').forEach(el => el.classList.remove('sel'));
  const el = $('row' + selN);
  if (el){
    el.classList.add('sel');
    if (scroll){
      const top = el.offsetTop - listEl.clientHeight / 2 + el.clientHeight / 2;
      listEl.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }
  }
}

function select(n, scroll){
  selN = Math.min(52, Math.max(1, n));
  renderHero();
  markSel(scroll !== false);
}

function setProg(p){
  if (prog === p) return;
  prog = p;
  renderHero();
  renderList();
  markSel(true);
}

function gIndex(){ return WE_DATA.findIndex(r => r.p === prog && r.n === selN); }

function stepGlobal(d){
  const i = gIndex() + d;
  if (i < 0 || i >= WE_DATA.length) return;
  const r = WE_DATA[i];
  const progChanged = r.p !== prog;
  prog = r.p; selN = r.n;
  renderHero();
  if (progChanged) renderList();
  markSel(true);
}

// ---- events ----
$('prevBtn').addEventListener('click', () => stepGlobal(-1));
$('nextBtn').addEventListener('click', () => stepGlobal(1));
$('todayBtn').addEventListener('click', () => {
  prog = CURRENT.p; selN = CURRENT.n;
  renderHero(); renderList(); markSel(true);
});
$('seg2526').addEventListener('click', () => setProg('25/26'));
$('seg2627').addEventListener('click', () => setProg('26/27'));

listEl.addEventListener('click', e => {
  const row = e.target.closest('.row');
  if (row) select(Number(row.dataset.n));
});

weInput.addEventListener('focus', () => { weInput.select(); });
weInput.addEventListener('input', () => {
  const v = weInput.value.replace(/\D/g, '');
  weInput.value = v;
  const n = Number(v);
  if (v && n >= 1 && n <= 52){
    selN = n; 
    const r = getRow(prog, selN);
    $('dates').textContent = r.full;
    $('tag').textContent = r.t || '';
    const [txt, isNow] = relText(r);
    $('status').textContent = txt;
    $('status').classList.toggle('now', isNow);
    $('dot').classList.toggle('now', isNow);
    markSel(true);
  }
});
weInput.addEventListener('blur', () => {
  renderHero();
  window.scrollTo(0, 0); // iOS keyboard-dismiss snap
});
weInput.addEventListener('keydown', e => { if (e.key === 'Enter') weInput.blur(); });

// ---- init ----
renderHero();
renderList();
requestAnimationFrame(() => markSel(true));
</script>
